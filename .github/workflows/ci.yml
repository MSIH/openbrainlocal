name: CI

# Runs the test suite + connector-boundary check on every PR and on pushes to the default
# branch (2.0). The repo's mandatory workflow (draft-issue → worktree → pre-pr-review) is a
# LOCAL honor-system gate (.claude/hooks) that a direct push or a second contributor bypasses;
# this is the server-side net. No Ollama in CI — the suite passes with the embedder/planner
# offline (graceful-degradation paths), and we assert that stays true by NOT installing it.

on:
  pull_request:
  push:
    branches: [2.0]

# One in-flight run per ref; a new push cancels the previous run for the same PR/branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # report every matrix cell, don't cancel siblings on first red
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22] # Node 18 is EOL (Apr 2025); README floor bump tracked separately
    env:
      # Server-booting tests (server.test / ui-token.test) require a non-placeholder key.
      # This is a throwaway CI value, NOT a secret — it authorizes nothing outside the runner.
      LIFECONTEXT_API_KEY: ci-throwaway-key-0123456789abcdef
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install (locked)
        run: npm ci

      # better-sqlite3 / sqlite-vec are native; a cached or prebuilt binary can mismatch the
      # runner's Node ABI. Rebuild is cheap insurance against a "was compiled against a
      # different Node.js version" load error.
      - name: Rebuild native module (guard)
        run: npm rebuild better-sqlite3

      - name: Test
        run: npm test

      - name: Connector boundary check
        run: npm run check:boundary
