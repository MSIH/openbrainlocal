<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <!-- The capability token lives in the URL path; no-referrer keeps it out of the Referer header
       on any outbound request/navigation (#163). -->
  <meta name="referrer" content="no-referrer" />
  <title>LifeContext · Contacts</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- API key bar: shown until a key is stored, or after a 401. The whole /api/v1 surface is
       x-api-key gated; the key lives only in this browser's localStorage. -->
  <div id="keyBar" class="keybar" hidden>
    <label>API key
      <input id="keyInput" type="password" autocomplete="off" placeholder="LIFECONTEXT_API_KEY" />
    </label>
    <button id="keySave" type="button">Save key</button>
    <span id="keyMsg" class="keymsg"></span>
  </div>

  <header class="topbar">
    <h1>Contacts</h1>
    <nav class="navlinks" aria-label="Primary">
      <a href="./chat.html">Ask</a>
      <a href="./contacts.html" class="active" aria-current="page">Contacts</a>
    </nav>
    <input id="search" type="search" placeholder="Search name, email, phone…" autocomplete="off" />
    <div class="filters" id="kindFilter" role="tablist">
      <button data-kind="" class="active" type="button">All</button>
      <button data-kind="person" type="button">People</button>
      <button data-kind="org" type="button">Orgs</button>
    </div>
    <button id="newContact" type="button" class="primary">+ New</button>
    <button id="duplicates" type="button" title="Review probable duplicate contacts">Duplicates</button>
    <button id="proposed" type="button" title="Review auto-proposed contacts awaiting approval">Proposed</button>
    <button id="saveTop" type="button" class="primary" hidden>Save</button>
    <button id="keyEdit" type="button" class="ghost" title="Change API key">🔑</button>
  </header>

  <main class="layout">
    <aside class="list" id="list" aria-label="Contacts"></aside>
    <section class="detail" id="detail">
      <p class="empty">Select a contact, or create one.</p>
    </section>

    <!-- Duplicates review overlay (#120): consumes GET /api/v1/entities/duplicates + POST
         /api/v1/entities/merge. Fixed drawer over the content; hidden until the topbar Duplicates
         button (or a 409 alias conflict) opens it. role=dialog + focus move/restore in app.js. -->
    <div id="dupPanel" class="duppanel" role="dialog" aria-modal="true" aria-labelledby="dupTitle" hidden>
      <div class="dup-headbar">
        <h2 id="dupTitle">Probable duplicates</h2>
        <button id="dupClose" type="button" class="ghost" title="Close" aria-label="Close duplicates panel">✕</button>
      </div>
      <div id="dupList"></div>
    </div>

    <!-- Proposed-entities review overlay (#143): consumes GET /api/v1/entities/proposed +
         POST /api/v1/entities/proposed/:id/{approve,reject} (backend #119). Same drawer pattern
         as #dupPanel — role=dialog + focus move/restore in app.js. Approve mints/links a contact;
         Reject marks it rejected (append-only, never re-raised). -->
    <div id="propPanel" class="duppanel" role="dialog" aria-modal="true" aria-labelledby="propTitle" hidden>
      <div class="dup-headbar">
        <h2 id="propTitle">Proposed contacts</h2>
        <button id="propStage" type="button" title="Stage review proposals from the loaded contacts directory">Stage from directory</button>
        <button id="propClose" type="button" class="ghost" title="Close" aria-label="Close proposed contacts panel">✕</button>
      </div>
      <div id="propList"></div>
    </div>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
