<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>LifeContext · Ask</title>
  <link rel="stylesheet" href="/ui/style.css" />
</head>
<body>
  <!-- API key bar: shown until a key is stored, or after a 401. The whole /api surface is
       x-api-key gated; the key lives only in this browser's localStorage. -->
  <div id="keyBar" class="keybar" hidden>
    <label>API key
      <input id="keyInput" type="password" autocomplete="off" placeholder="LIFECONTEXT_API_KEY" />
    </label>
    <button id="keySave" type="button">Save key</button>
    <span id="keyMsg" class="keymsg"></span>
  </div>

  <header class="topbar">
    <h1>Ask</h1>
    <nav class="navlinks">
      <a href="/ui/chat.html" class="active">Ask</a>
      <a href="/ui/contacts.html">Contacts</a>
    </nav>
    <div class="filters" id="modeToggle" role="tablist" title="search = rich artifact results; recall = simple text matches">
      <button data-mode="search" class="active" type="button">Search</button>
      <button data-mode="recall" type="button">Recall</button>
    </div>
    <button id="keyEdit" type="button" class="ghost" title="Change API key">🔑</button>
  </header>

  <!-- Read-only memory query: a transcript of queries + result cards. No memory mutation here. -->
  <main class="chat">
    <div id="transcript" class="transcript" aria-live="polite"></div>
    <form id="askForm" class="askbar">
      <input id="ask" type="text" placeholder="Ask your memory… (e.g. “trip to Tokyo”, “Amy's phone number”)" autocomplete="off" autofocus />
      <button type="submit" class="primary">Ask</button>
    </form>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="/ui/chat.js"></script>
</body>
</html>
