<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <!-- The capability token lives in the URL path; no-referrer keeps it out of the Referer header
       on any outbound request/navigation (#163). -->
  <meta name="referrer" content="no-referrer" />
  <title>LifeContext · Ask</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- API key bar: shown until a key is stored, or after a 401. The whole /api surface is
       x-api-key gated; the key lives only in this browser's localStorage. -->
  <div id="keyBar" class="keybar" hidden>
    <label>API key
      <input id="keyInput" type="password" autocomplete="off" placeholder="LIFECONTEXT_API_KEY" />
    </label>
    <button id="keySave" type="button">Save key</button>
    <span id="keyMsg" class="keymsg"></span>
  </div>

  <header class="topbar">
    <h1>Ask</h1>
    <nav class="navlinks" aria-label="Primary">
      <a href="./chat.html" class="active" aria-current="page">Ask</a>
      <a href="./contacts.html">Contacts</a>
    </nav>
    <div class="filters" id="modeToggle" role="group" aria-label="Result mode" title="search = rich artifact results; recall = simple text matches">
      <button data-mode="search" class="active" type="button" aria-pressed="true">Search</button>
      <button data-mode="recall" type="button" aria-pressed="false">Recall</button>
    </div>
    <button id="keyEdit" type="button" class="ghost" aria-label="Change API key" title="Change API key">🔑</button>
  </header>

  <!-- Read-only memory query: a transcript of queries + result cards. No memory mutation here. -->
  <main class="chat">
    <div id="transcript" class="transcript" aria-live="polite"></div>
    <form id="askForm" class="askbar">
      <input id="ask" type="text" placeholder="Ask your memory… (e.g. “trip to Tokyo”, “Amy's phone number”)" autocomplete="off" autofocus />
      <button type="submit" class="primary">Ask</button>
    </form>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="./chat.js"></script>
</body>
</html>
